<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Event Assistant</title>
    <!-- Google Fonts -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="app-container">
        <header class="header">
            <div class="header-icon">✨</div>
            <div class="header-text">
                <h1>Smart Event Assistant</h1>
                <p>Your AI guide to sessions, navigation, and recommendations</p>
            </div>
        </header>
        
        <main class="chat-container">
            <div id="chatBox" class="chat-box">
                <div class="message bot-msg">
                    <div class="msg-avatar">🤖</div>
                    <div class="msg-bubble">
                        Hello! Let me know what you need help with for today's event!
                    </div>
                </div>
            </div>
        </main>
        
        <footer class="input-container">
            <div class="input-wrapper">
                <input type="text" id="userInput" placeholder="Ask anything about the event..." autocomplete="off">
                <button id="sendBtn" onclick="sendMessage()">
                    Send
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="22" y1="2" x2="11" y2="13"></line><polygon points="22 2 15 22 11 13 2 9 22 2"></polygon></svg>
                </button>
            </div>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
